version: '3.8'

services:
  velora-app:
    image: ghcr.io/${GITHUB_REPOSITORY_OWNER:-anishdubey27}/velora:latest
    ports:
      - "3000:3000"
    restart: unless-stopped
    env_file:
      - .env
    deploy:
      resources:
        limits:
          memory: 700M
    environment:
      - NODE_ENV=production
